<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BackToHell - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

:root{
    --bg:#0b0714;
    --card:#161022;
    --border:#2c1d47;
    --primary:#8b5cf6;
    --primary2:#6d28d9;
    --text:#ffffff;
    --sub:#b6abd1;
}

body{
    background:
    radial-gradient(circle at top,#2a1847 0%,transparent 35%),
    linear-gradient(180deg,#0b0714,#120a20);

    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    color:var(--text);
}

.login-card{
    width:100%;
    max-width:400px;
    background:rgba(22,16,34,.95);
    border:1px solid var(--border);
    border-radius:28px;
    padding:30px;
    backdrop-filter:blur(14px);
    box-shadow:0 0 40px rgba(139,92,246,.18);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-size:42px;
    font-weight:800;
    background:linear-gradient(135deg,#ffffff,#b892ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo p{
    color:var(--sub);
    margin-top:8px;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:var(--sub);
    font-size:14px;
}

.input-box{
    position:relative;
}

.input-box span{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:#9f8ccf;
    font-size:20px;
}

.input-box input{
    width:100%;
    height:54px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#100b1b;
    border:1px solid #38255c;
    padding:0 16px 0 48px;
    color:#fff;
    font-size:15px;
}

.input-box input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(139,92,246,.15);
}

.login-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    margin-top:10px;
    background:linear-gradient(135deg,var(--primary),var(--primary2));
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(139,92,246,.35);
}

.footer{
    margin-top:22px;
    text-align:center;
    color:var(--sub);
    font-size:13px;
}

</style>
</head>
<body>

<div class="login-card">

    <div class="logo">
        <h1>BackToHell</h1>
        <p>Painel Educacional</p>
    </div>

    <div class="input-group">
        <label>RA</label>

        <div class="input-box">
            <span class="material-icons-round">badge</span>

            <input 
            type="text" 
            id="ra"
            placeholder="Digite seu RA">
        </div>
    </div>

    <div class="input-group">
        <label>Senha</label>

        <div class="input-box">
            <span class="material-icons-round">lock</span>

            <input 
            type="password" 
            id="senha"
            placeholder="Digite sua senha">
        </div>
    </div>

    <button class="login-btn" onclick="entrar()">
        Entrar
    </button>

    <div class="footer">
        Sistema privado
    </div>

</div>

<script>

function entrar(){

    const ra = document.getElementById("ra").value;
    const senha = document.getElementById("senha").value;

    if(ra === "" || senha === ""){
        alert("Preencha todos os campos");
        return;
    }

    const usuario = {
        nome: "Aluno",
        ra: ra
    };

    localStorage.setItem(
        "usuario",
        JSON.stringify(usuario)
    );

    window.location.href = "home.html";
}

</script>

</body>
        </html>
